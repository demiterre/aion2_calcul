<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aion 2 상급 마석 기댓값 계산기</title>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; background-color: #1e1e1e; color: #fff; margin: 0; padding: 20px; display: flex; justify-content: center; }
        .container { background-color: #2d2d2d; padding: 30px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); max-width: 500px; width: 100%; }
        h1 { font-size: 20px; text-align: center; border-bottom: 2px solid #555; padding-bottom: 10px; margin-top: 0; }
        .section-title { font-size: 15px; font-weight: bold; margin: 20px 0 10px 0; color: #4da6ff; }
        .row { margin-bottom: 10px; display: flex; align-items: center; }
        select, input { padding: 8px; border-radius: 5px; border: 1px solid #555; background-color: #444; color: #fff; outline: none; }
        select { flex-grow: 1; margin-left: 10px; }
        input[type="radio"] { margin-right: 5px; }
        .radio-group { display: flex; gap: 20px; }
        .btn-calc { width: 100%; padding: 15px; background-color: #0078d7; color: white; border: none; border-radius: 5px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 20px; transition: background 0.3s; }
        .btn-calc:hover { background-color: #005a9e; }
        .btn-calc:disabled { background-color: #555; cursor: not-allowed; }
        .result-box { background-color: #111; border: 1px solid #444; padding: 15px; border-radius: 5px; margin-top: 10px; min-height: 120px; white-space: pre-wrap; font-size: 14px; line-height: 1.5; color: #ddd;}
    </style>
</head>
<body>

<div class="container">
    <h1>🎯 [Aion 2] 상급 마석석 기댓값 계산기</h1>

    <div class="section-title">1. 장비 등급 (슬롯 개수) 선택</div>
    <div class="radio-group row">
        <label><input type="radio" name="slots" value="4" checked> 유일 장비 (4슬롯)</label>
        <label><input type="radio" name="slots" value="5"> 영웅 장비 (5슬롯)</label>
    </div>

    <div class="section-title">2. 시뮬레이션 반복 횟수 설정</div>
    <div class="row">
        <select id="simCountSelect" style="flex-grow: 0; width: 120px; margin-left: 0; margin-right: 10px;">
            <option value="10000">10,000</option>
            <option value="100000" selected>100,000</option>
            <option value="500000">500,000</option>
            <option value="1000000">1,000,000</option>
            <option value="custom">직접 입력</option>
        </select>
        <input type="number" id="simCountInput" value="100000" style="display: none; width: 120px;" placeholder="숫자 입력">
        <span>회</span>
    </div>

    <div class="section-title">3. 목표 옵션 선택 (최대 5개)</div>
    <div id="optionsContainer">
        </div>

    <button id="calcBtn" class="btn-calc" onclick="startSimulation()">▶ 기댓값 시뮬레이션 시작</button>

    <div class="section-title">4. 계산 결과</div>
    <div id="resultBox" class="result-box">결과가 여기에 표시됩니다.</div>
</div>

<script>
    // 확률 데이터 (합계 100%)
    const optionsData = {
        "선택 안 함": 0.0,
        "[최상급] 공격력 +10": 1.5,
        "[최상급] 추가 명중 +15": 1.5,
        "[최상급] 치명타 +15": 1.5,
        "[최상급] 피해 증폭 +100": 0.075,
        "[최상급] 무기 피해 증폭 +100": 0.075,
        "[최상급] 치명타 피해 증폭 +100": 0.075,
        "[최상급] 후방 피해 증폭 +100": 0.075,
        "꽝 (기타 무효 옵션)": 95.2
    };

    const optionNames = Object.keys(optionsData);
    const optionWeights = Object.values(optionsData);

    // 드롭다운 옵션 목록 ('꽝' 제외)
    const selectableOptions = optionNames.filter(name => name !== "꽝 (기타 무효 옵션)");

    // UI 초기화: 옵션 선택기 5개 만들기
    const container = document.getElementById('optionsContainer');
    for (let i = 1; i <= 5; i++) {
        let row = document.createElement('div');
        row.className = 'row';
        row.innerHTML = `<label style="width: 60px;">옵션 ${i} :</label><select id="target${i}"></select>`;
        container.appendChild(row);
        
        let selectElement = document.getElementById(`target${i}`);
        selectableOptions.forEach(opt => {
            let option = document.createElement('option');
            option.value = opt;
            option.text = opt;
            selectElement.appendChild(option);
        });
    }

    // 시뮬레이션 횟수 직접 입력 토글
    const simSelect = document.getElementById('simCountSelect');
    const simInput = document.getElementById('simCountInput');
    simSelect.addEventListener('change', (e) => {
        if (e.target.value === 'custom') {
            simSelect.style.display = 'none';
            simInput.style.display = 'inline-block';
            simInput.focus();
        }
    });

    // 가중치에 따른 랜덤 선택 함수
    function getRandomOption() {
        let rand = Math.random() * 100;
        let sum = 0;
        for (let i = 0; i < optionNames.length; i++) {
            sum += optionWeights[i];
            if (rand <= sum) return optionNames[i];
        }
        return "꽝 (기타 무효 옵션)";
    }

    function startSimulation() {
        const slots = parseInt(document.querySelector('input[name="slots"]:checked').value);
        let targets = [];
        for (let i = 1; i <= 5; i++) {
            let val = document.getElementById(`target${i}`).value;
            if (val !== "선택 안 함") targets.push(val);
        }

        const resultBox = document.getElementById('resultBox');
        const calcBtn = document.getElementById('calcBtn');

        if (targets.length === 0) {
            resultBox.innerText = "❌ 목표 옵션을 최소 1개 이상 선택해 주세요.";
            return;
        }

        let simulations = simSelect.value === 'custom' ? parseInt(simInput.value) : parseInt(simSelect.value);
        if (isNaN(simulations) || simulations <= 0) {
            resultBox.innerText = "❌ 올바른 시뮬레이션 횟수를 입력해 주세요.";
            return;
        }

        // UI 잠금 및 로딩 표시
        calcBtn.disabled = true;
        calcBtn.innerText = "계산 중입니다...";
        resultBox.innerText = `${simulations.toLocaleString()}회 시뮬레이션을 진행 중입니다...\n잠시만 기다려주세요.`;

        // UI 업데이트를 위해 setTimeout 사용 (브라우저 멈춤 방지)
        setTimeout(() => {
            let successCount = 0;

            for (let i = 0; i < simulations; i++) {
                let rolled = [];
                for (let s = 0; s < slots; s++) rolled.push(getRandomOption());

                let success = true;
                let rolledCopy = [...rolled];
                
                for (let t = 0; t < targets.length; t++) {
                    let idx = rolledCopy.indexOf(targets[t]);
                    if (idx !== -1) {
                        rolledCopy.splice(idx, 1);
                    } else {
                        success = false;
                        break;
                    }
                }
                if (success) successCount++;
            }

            // 결과 출력
            if (successCount > 0) {
                let prob = successCount / simulations;
                let expectedTries = 1 / prob;

                resultBox.innerText = `🎯 시뮬레이션 완료 (${simulations.toLocaleString()}회 기준)\n\n` +
                                      `- 해당 조합 성공 확률 : 약 ${(prob * 100).toFixed(6)}%\n` +
                                      `- 평균 필요 마석 개수 : 약 ${Math.round(expectedTries).toLocaleString()} 개`;
            } else {
                resultBox.innerText = `❌ 확률이 너무 낮습니다.\n\n${simulations.toLocaleString()}번의 시뮬레이션 동안\n해당 조합이 단 한 번도 등장하지 않았습니다.\n(시뮬레이션 횟수를 더 늘려서 다시 시도해 보세요.)`;
            }

            // UI 복구
            calcBtn.disabled = false;
            calcBtn.innerText = "▶ 기댓값 시뮬레이션 시작";
        }, 50); // 50ms 지연 후 실행
    }
</script>

</body>
</html>
